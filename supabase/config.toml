[auth]
enabled = true
site_url = "https://poke-collector.netlify.app"
additional_redirect_urls = ["http://localhost:5173/", "https://poke-collector.netlify.app/"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.mfa]
max_enrolled_factors = 10
[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 86400

# Security: Enable password breach protection using HaveIBeenPwned.org
# This prevents users from using passwords that have been compromised in data breaches
# Note: This feature must be enabled manually in the Supabase dashboard
# under Authentication > Settings > Password Protection

# Configuración de las edge functions. Este es el ÚNICO config que lee el
# CLI de Supabase; no crear otros config.toml dentro de functions/.
[functions]

[functions.initialize-user]
verify_jwt = true

[functions.create-stripe-checkout]
verify_jwt = true

[functions.create-portal-session]
verify_jwt = true

[functions.change-subscription]
verify_jwt = true

[functions.cancel-subscription]
verify_jwt = true

[functions.delete-user]
verify_jwt = true

[functions.send-email]
verify_jwt = false

# El webhook lo llama Stripe directamente: sin JWT; la seguridad es la firma
# (STRIPE_WEBHOOK_SECRET).
[functions.stripe-webhook]
verify_jwt = false

[functions.stripe-admin]
verify_jwt = true

[functions.stripe-subscriptions]
verify_jwt = true

[functions.sync-subscription]
verify_jwt = true

