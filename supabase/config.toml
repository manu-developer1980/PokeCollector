[auth]
enabled = true
site_url = "https://poke-collector.netlify.app"
additional_redirect_urls = [
  "http://localhost:5173/",
  "http://localhost:5173/reset-password",
  "https://poke-collector.netlify.app/",
  "https://poke-collector.netlify.app/reset-password",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.mfa]
max_enrolled_factors = 10
[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

# Con SMTP propio se puede subir el límite de envío (el default es 2/hora)
[auth.rate_limit]
email_sent = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 86400

# SMTP de Brevo para los emails de auth (registro, recuperación, magic link).
# La clave SMTP (xsmtpsib-..., distinta de la API key xkeysib-) se pasa como
# BREVO_SMTP_KEY al hacer `supabase config push`.
[auth.email.smtp]
enabled = true
host = "smtp-relay.brevo.com"
port = 587
user = "8a53db001@smtp-brevo.com"
pass = "env(BREVO_SMTP_KEY)"
admin_email = "manu.developer1980@gmail.com" # remitente validado en Brevo
sender_name = "PokéCollector"

# Plantillas en español (las nativas de Supabase son mono-idioma; las
# versiones en/es originales siguen en src/emails/ por si se vuelve al hook).
[auth.email.template.confirmation]
subject = "Confirma tu email - PokéCollector"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "Restablece tu contraseña - PokéCollector"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.magic_link]
subject = "Tu enlace mágico - PokéCollector"
content_path = "./supabase/templates/magic_link.html"

# Security: Enable password breach protection using HaveIBeenPwned.org
# This prevents users from using passwords that have been compromised in data breaches
# Note: This feature must be enabled manually in the Supabase dashboard
# under Authentication > Settings > Password Protection

# Configuración de las edge functions. Este es el ÚNICO config que lee el
# CLI de Supabase; no crear otros config.toml dentro de functions/.
[functions]

[functions.initialize-user]
verify_jwt = true

[functions.create-stripe-checkout]
verify_jwt = true

[functions.create-portal-session]
verify_jwt = true

[functions.change-subscription]
verify_jwt = true

[functions.cancel-subscription]
verify_jwt = true

[functions.delete-user]
verify_jwt = true

[functions.send-email]
verify_jwt = false

# El webhook lo llama Stripe directamente: sin JWT; la seguridad es la firma
# (STRIPE_WEBHOOK_SECRET).
[functions.stripe-webhook]
verify_jwt = false

[functions.stripe-admin]
verify_jwt = true

[functions.stripe-subscriptions]
verify_jwt = true

[functions.sync-subscription]
verify_jwt = true


# Puertos locales para el CLI (54320 cae en un rango excluido por Hyper-V en
# esta maquina; ver netsh interface ipv4 show excludedportrange)
[db]
port = 55432
shadow_port = 55433
major_version = 17
