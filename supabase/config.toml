[auth]
site_url = "https://poke-collector.netlify.app"
additional_redirect_urls = [
  "http://localhost:5173",
  "http://localhost:5173/auth/callback",
  "http://localhost:5173/login",
  "http://localhost:5173/dashboard",
  "http://localhost:5173/",
  "https://poke-collector.netlify.app",
  "https://poke-collector.netlify.app/auth/callback",
  "https://poke-collector.netlify.app/login",
  "https://poke-collector.netlify.app/dashboard",
  "https://poke-collector.netlify.app/"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1m0s"
otp_expiry = 3600
otp_length = 6

[functions]
[functions.create-checkout]
verify_jwt = true
[functions.stripe-webhook]
verify_jwt = false
