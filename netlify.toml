[build]
  # Comando de build
  command = "npm run build"
  # Directorio de publicación
  publish = "dist"

[build.environment]
  # Versión de Node.js (Vite 7 y React Router 7 requieren >=20)
  NODE_VERSION = "22"

# Configuración de redirects para SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://pokecollect-backend-t5ia.onrender.com https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com;"

# Configuración para archivos estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Configuración para el service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"